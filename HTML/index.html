<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3498db; --bg: #0f0f0f; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; display: none; justify-content: center; align-items: center; height: 100vh; margin: 0; background: rgba(0,0,0,0.85); color: white; overflow: hidden; }
        .wrapper { width: 550px; background: var(--bg); border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .header { padding: 20px 25px; background: #151515; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .list { padding: 20px; max-height: 400px; overflow-y: auto; }
        .item { background: var(--card); border-radius: 8px; padding: 15px; margin-bottom: 12px; border-left: 4px solid #444; transition: 0.2s; }
        .item.active { border-left-color: var(--primary); background: #222; }
        .xp-bg { width: 100%; height: 6px; background: #2a2a2a; border-radius: 10px; margin-top: 10px; }
        .xp-fill { height: 100%; background: var(--primary); border-radius: 10px; transition: width 0.6s ease; }
        .btn { float: right; background: var(--primary); border: none; color: white; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div><h1 style="margin:0; font-size: 20px;">CAREER CENTER</h1><small style="color:#666;">Multi-Job Management</small></div>
            <i class="fas fa-id-card" style="font-size: 24px; color: var(--primary);"></i>
        </div>
        <div class="list" id="job-list"></div>
    </div>
    <script>
        window.addEventListener('message', function(e) {
            if (e.data.action === "open") {
                document.body.style.display = "flex";
                const list = document.getElementById('job-list');
                list.innerHTML = '';
                e.data.jobs.forEach(job => {
                    const active = job.job_name === e.data.activeJob;
                    const next = Math.floor(e.data.xpConfig.base * Math.pow(e.data.xpConfig.mult, job.job_level - 1));
                    const pct = (job.job_xp / next) * 100;
                    list.innerHTML += `
                        <div class="item ${active ? 'active' : ''}">
                            <button class="btn" ${active ? 'disabled' : ''} onclick="swap('${job.job_name}', ${job.job_grade})">${active ? 'ON DUTY' : 'SELECT'}</button>
                            <div style="display:flex; align-items:center;">
                                <i class="${job.icon}" style="font-size:20px; margin-right:15px; color: var(--primary);"></i>
                                <div><div style="font-weight:bold;">${job.job_label}</div><div style="color:#888; font-size:12px;">${job.grade_label} • Level ${job.job_level}</div></div>
                            </div>
                            <div class="xp-bg"><div class="xp-fill" style="width: ${pct}%"></div></div>
                        </div>`;
                });
            }
        });
        function swap(n, g) { fetch(`https://${GetParentResourceName()}/confirmSwitch`, { method: 'POST', body: JSON.stringify({job: n, grade: g}) }); close(); }
        function close() { document.body.style.display = "none"; fetch(`https://${GetParentResourceName()}/close`, { method: 'POST' }); }
        document.onkeyup = (e) => { if (e.key === "Escape") close(); };
    </script>
</body>
</html>
